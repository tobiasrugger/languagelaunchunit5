<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Launch – Unit 5</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f7ff; --paper:#fff; --ink:#1a2236; --muted:#6b7a99; --border:#dde4f0;
  --blue:#2563eb; --blue-light:#dbeafe; --green:#16a34a; --green-light:#dcfce7;
  --orange:#ea580c; --shadow:0 4px 20px rgba(37,99,235,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
header{background:linear-gradient(135deg,#1d4ed8,#7c3aed);padding:28px 32px;}
.logo{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:#fff;}
.logo span{color:#fbbf24;}
.tagline{color:#bfdbfe;font-size:0.9rem;margin-top:4px;}
main{max-width:600px;margin:40px auto;padding:0 20px 60px;}
.unit-header{
  font-family:'Fraunces',serif;font-size:1.6rem;font-weight:900;
  color:var(--blue);margin-bottom:6px;
}
.unit-sub{color:var(--muted);font-size:0.9rem;margin-bottom:32px;}
.lesson-list{display:flex;flex-direction:column;gap:12px;}
.lesson-row{
  background:var(--paper);border:2px solid var(--border);border-radius:16px;
  padding:18px 20px;display:flex;align-items:center;gap:16px;
  box-shadow:var(--shadow);transition:all 0.18s;
}
.lesson-row.available:hover{border-color:var(--blue);transform:translateY(-2px);}
.lesson-row.locked{opacity:0.45;cursor:not-allowed;}
.lesson-num{
  width:40px;height:40px;border-radius:50%;background:var(--blue);
  color:#fff;font-family:'Fraunces',serif;font-weight:900;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.lesson-row.locked .lesson-num{background:var(--border);color:var(--muted);}
.lesson-info{flex:1;}
.lesson-title{font-weight:800;font-size:1rem;color:var(--ink);}
.lesson-topic{font-size:0.82rem;color:var(--muted);margin-top:2px;}
.lesson-row.locked .lesson-title{color:var(--muted);}
a.lesson-link{text-decoration:none;color:inherit;display:flex;align-items:center;gap:16px;flex:1;}
.lesson-link:visited{color:inherit;}
.lesson-arrow{color:var(--blue);font-size:1.2rem;flex-shrink:0;}
.lesson-row.locked .lesson-arrow{color:var(--border);}
.lock-icon{color:var(--muted);font-size:1rem;flex-shrink:0;}

/* CHECKBOX */
.complete-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.complete-wrap label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);}
.complete-cb{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  background:#fff;cursor:pointer;appearance:none;-webkit-appearance:none;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;position:relative;
}
.complete-cb:checked{background:var(--green);border-color:var(--green);}
.complete-cb:checked::after{
  content:'✓';color:#fff;font-weight:900;font-size:0.85rem;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
}
.complete-cb:hover:not(:disabled){border-color:var(--green);}
.complete-cb:disabled{opacity:0.3;cursor:not-allowed;}

/* COMING SOON badge */
.coming-badge{
  font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;
  background:#f1f5f9;color:var(--muted);padding:3px 8px;border-radius:6px;
}
</style>
</head>
<body>

<header>
  <div class="logo">Language <span>Launch</span></div>
  <div class="tagline">Unit 5 · What in the World?</div>
</header>

<main>
  <div class="unit-header">Unit 5 Lessons</div>
  <div class="unit-sub">Click a lesson to begin. Check the box when you finish.</div>

  <div class="lesson-list" id="lesson-list"></div>
</main>

<script>
const LESSONS = [
  { num:1,  title:'Lesson 1',  topic:'What in the World?',  file:'ll_lesson1.html',  available:true  },
  { num:2,  title:'Lesson 2',  topic:'The Ecosystem',       file:'ll_lesson2.html',  available:true  },
  { num:3,  title:'Lesson 3',  topic:'Plants',              file:'ll_lesson3.html',  available:true  },
  { num:4,  title:'Lesson 4',  topic:'Animals',             file:'ll_lesson4.html',  available:true  },
  { num:5,  title:'Lesson 5',  topic:'Break It Down!',      file:'ll_lesson5.html',  available:true  },
  { num:6,  title:'Lesson 6',  topic:'Coming soon',         file:null,               available:false },
  { num:7,  title:'Lesson 7',  topic:'Coming soon',         file:null,               available:false },
  { num:8,  title:'Lesson 8',  topic:'Coming soon',         file:null,               available:false },
  { num:9,  title:'Lesson 9',  topic:'Coming soon',         file:null,               available:false },
  { num:10, title:'Lesson 10', topic:'Coming soon',         file:null,               available:false },
  { num:11, title:'Lesson 11', topic:'Coming soon',         file:null,               available:false },
  { num:12, title:'Lesson 12', topic:'Coming soon',         file:null,               available:false },
  { num:13, title:'Lesson 13', topic:'Coming soon',         file:null,               available:false },
];

// Load completed state from localStorage
function getCompleted() {
  try { return JSON.parse(localStorage.getItem('ll_u5_completed') || '{}'); } catch(e) { return {}; }
}
function setCompleted(num, val) {
  const c = getCompleted();
  c[num] = val;
  localStorage.setItem('ll_u5_completed', JSON.stringify(c));
}

function render() {
  const completed = getCompleted();
  const list = document.getElementById('lesson-list');
  list.innerHTML = '';

  LESSONS.forEach(function(lesson) {
    const row = document.createElement('div');
    row.className = 'lesson-row ' + (lesson.available ? 'available' : 'locked');

    const numDiv = '<div class="lesson-num">' + lesson.num + '</div>';

    const infoDiv =
      '<div class="lesson-info">' +
      '<div class="lesson-title">' + lesson.title + '</div>' +
      '<div class="lesson-topic">' + lesson.topic + '</div>' +
      '</div>';

    const arrowOrLock = lesson.available
      ? '<div class="lesson-arrow">&#8594;</div>'
      : '<div class="lock-icon">&#128274;</div>';

    const cbHtml = lesson.available
      ? '<div class="complete-wrap">' +
        '<input type="checkbox" class="complete-cb" id="cb' + lesson.num + '"' +
        (completed[lesson.num] ? ' checked' : '') + '>' +
        '<label for="cb' + lesson.num + '">Done?</label>' +
        '</div>'
      : '<div class="complete-wrap">' +
        '<input type="checkbox" class="complete-cb" disabled>' +
        '<label style="opacity:0.3">Done?</label>' +
        '</div>';

    if (lesson.available && lesson.file) {
      row.innerHTML =
        '<a class="lesson-link" href="' + lesson.file + '">' +
        numDiv + infoDiv + arrowOrLock +
        '</a>' + cbHtml;
    } else {
      row.innerHTML = numDiv + infoDiv + arrowOrLock + cbHtml;
    }

    list.appendChild(row);

    // Checkbox change — stop event from bubbling to link
    const cb = document.getElementById('cb' + lesson.num);
    if (cb) {
      cb.addEventListener('change', function(e) {
        e.stopPropagation();
        setCompleted(lesson.num, cb.checked);
      });
      cb.addEventListener('click', function(e) { e.stopPropagation(); });
    }
  });
}

render();
</script>
</body>
</html>
